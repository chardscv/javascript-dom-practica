<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RGB</title>
    <link href="style.css" rel="stylesheet">
  </head>
  <body>
      <div class="container">
        <div class="content-color">
          <p id="text-red"></p>
          <input id="red" type="range" value="60" min="0" max="255">
          <label for="red">Red</label>
        </div>
        <div class="content-color">
          <p id="text-green"></p>
          <input id="green" type="range" value="90" min="0" max="255">
          <label for="green">Green</label>
        </div> 
        <div class="content-color">
          <p id="text-blue"></p>
          <input id="blue" type="range" value="190" min="0" max="255">
          <label for="blue">Blue</label>
        </div>  
      </div> 

      <script src="main.js"></script>
  </body>
</html>
